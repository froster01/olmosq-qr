name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  VPS_HOST: 84.247.148.159
  VPS_USER: root
  VPS_SSH_PORT: 22

jobs:
  test:
    name: Test before deploy
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Deploy over SSH
        shell: bash
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy
          chmod 600 ~/.ssh/vps_deploy
          cat > ~/.ssh/known_hosts <<'KNOWN_HOSTS'
          84.247.148.159 ssh-rsa 
          84.247.148.159 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIINoNIj2QOSoBrinWxHz7hwqNBZ6DC0pEHcw6pVziqw1
          KNOWN_HOSTS
          ssh -i ~/.ssh/vps_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" \
            'bash -se' -- "$VPS_APP_DIR" production "${{ github.sha }}" <<'REMOTE'
          set -euo pipefail
          cd "$1"
          scripts/vps-deploy.sh "$2" "$3"
          REMOTE
